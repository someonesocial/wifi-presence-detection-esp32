; FireBeetle 2 ESP32-C5 Solar Weather Station
;
; ESP32-C5 support needs a recent Arduino-ESP32 / PlatformIO setup.
; If your installed PlatformIO release does not know this board yet, use
; Arduino IDE with the latest Espressif ESP32 board package and select an
; ESP32-C5 / FireBeetle 2 ESP32-C5 compatible board.

[env:firebeetle2_esp32c5]
platform = espressif32
board = esp32-c5-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
src_filter =
    +<main.cpp>

board_build.filesystem = littlefs
board_build.partitions = default.csv

lib_deps =
    adafruit/Adafruit BME280 Library @ ^2.3.0
    adafruit/Adafruit Unified Sensor @ ^1.1.15

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
